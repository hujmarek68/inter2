<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GENERATOR // ADMIN</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #eee; }
        .box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        button { background: #003366; color: white; padding: 10px; cursor: pointer; border: none; width: 100%; }
        .card { background: white; padding: 10px; margin-top: 5px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="box">
        <h2>DODAJ OSOBĘ</h2>
        <input type="text" id="name" placeholder="Imię i Nazwisko">
        <input type="text" id="phone" placeholder="Telefon">
        <input type="text" id="nat" placeholder="Narodowość">
        <textarea id="desc" placeholder="Opis"></textarea>
        <input type="file" id="fileInput">
        <button id="addBtn">DODAJ DO BAZY</button>
    </div>

    <div class="box">
        <h2>ZARZĄDZAJ WPISAMI</h2>
        <input type="text" id="search" placeholder="Szukaj po imieniu..." onkeyup="filter()">
        <div id="list"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAjzPmXerW0lmE9qRlK_POAGzYpAZ1F5UM", authDomain: "iner-55140.firebaseapp.com", databaseURL: "https://iner-55140-default-rtdb.firebaseio.com", projectId: "iner-55140", storageBucket: "iner-55140.firebasestorage.app", messagingSenderId: "299092984115", appId: "1:299092984115:web:a114c8dcb6ce11e8effe46" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const CLOUD_NAME = "drqvrxtlz";
        const UPLOAD_PRESET = "interpol";

        let allItems = [];

        // DODAWANIE Z DATĄ
        document.getElementById('addBtn').addEventListener('click', async () => {
            const file = document.getElementById('fileInput').files[0];
            let imgUrl = "";

            if(file) {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                imgUrl = data.secure_url;
            }

            const p = { 
                name: document.getElementById('name').value, 
                phone: document.getElementById('phone').value, 
                nat: document.getElementById('nat').value, 
                desc: document.getElementById('desc').value,
                img: imgUrl,
                timestamp: new Date().toISOString() // Zapisuje aktualną datę i czas
            };
            db.ref('wanted_list/').push(p);
            alert("Dodano pomyślnie!");
        });

        // POBIERANIE
        db.ref('wanted_list/').on('value', snap => {
            allItems = [];
            snap.forEach(c => allItems.push({ ...c.val(), id: c.key }));
            render(allItems);
        });

        // RENDEROWANIE
        function render(data) {
            const list = document.getElementById('list');
            list.innerHTML = '';
            data.forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<span>${p.name}</span>`;
                
                const delBtn = document.createElement('button');
                delBtn.innerText = "USUŃ";
                delBtn.style.width = "auto";
                delBtn.style.background = "red";
                delBtn.onclick = () => {
                    if(confirm("Czy na pewno usunąć " + p.name + "?")) {
                        db.ref('wanted_list/' + p.id).remove();
                    }
                };
                
                div.appendChild(delBtn);
                list.appendChild(div);
            });
        }

        // WYSZUKIWANIE
        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            render(allItems.filter(i => (i.name || "").toLowerCase().includes(q)));
        }
    </script>
</body>
</html>
